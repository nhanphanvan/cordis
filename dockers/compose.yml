services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: cordis
      POSTGRES_USER: cordis
      POSTGRES_PASSWORD: cordis
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cordis -d cordis"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    build:
      context: ..
      dockerfile: dockers/Dockerfile
    env_file:
      - ${CORDIS_ENV_FILE:-./.env.docker.example}
    environment:
      CORDIS_DB_URL: ${CORDIS_DB_URL:-postgresql+asyncpg://cordis:cordis@postgres:5432/cordis}
      CORDIS_STORAGE_PROVIDER: ${CORDIS_STORAGE_PROVIDER:-minio}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: poetry run alembic upgrade head
    restart: "no"

  backend:
    build:
      context: ..
      dockerfile: dockers/Dockerfile
    env_file:
      - ${CORDIS_ENV_FILE:-./.env.docker.example}
    environment:
      CORDIS_DB_URL: ${CORDIS_DB_URL:-postgresql+asyncpg://cordis:cordis@postgres:5432/cordis}
      CORDIS_STORAGE_PROVIDER: ${CORDIS_STORAGE_PROVIDER:-minio}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=5).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres-data:
  minio-data:
